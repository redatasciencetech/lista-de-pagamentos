<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faturas | Rogério Estumano Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #f4f6f8;">

    <div class="top-bar">
        <div class="brand">
            <img src="./img/mylogoR.png" onclick="window.location.href='menu.html'" alt="Logo Rogério">
        </div>
        <div class="page-title">
            <h1>Faturas</h1>
            <p>MARG DRESS CODE</p>
        </div>
    </div>

    <div class="seletor-empresas">
        <button onclick="selecionarEmpresa('todas')" style="padding: 10px 20px; background: #000; color: #E1C158; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Ver Todas</button>
        <img src="./img/aguasdopara-logo.png" onclick="selecionarEmpresa('aguas')" class="logo-empresa-cliente" alt="Águas do Pará">
        <img src="./img/equatorial-logo.png" onclick="selecionarEmpresa('equatorial')" class="logo-empresa-cliente" alt="Equatorial">
        <img src="./img/serena-logo.png" onclick="selecionarEmpresa('serena')" class="logo-empresa-cliente" alt="Serena">
        <img src="./img/clariai-logo.png" onclick="selecionarEmpresa('clariai')" class="logo-empresa-cliente" alt="Clariai">
        <img src="./img/sense-logo.png" onclick="selecionarEmpresa('sense')" class="logo-empresa-cliente" alt="Sense">
    </div>

    <div class="faturas-topo-info">
        <h1>Faturas em aberto</h1>
        <p id="resumo" class="resumo">Carregando dados...</p>
    </div>

    <div class="cards-container" id="cards"></div>

    <div id="areaHistorico" class="historico-container">
        <div class="historico-header">
            <h2>Histórico de Pagamentos</h2>
            <select id="filtroAno" onchange="aplicarFiltros()" style="padding: 10px; border-radius: 8px;">
                <option value="todos">Todos os Anos</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
        </div>
        <div class="tabela-responsiva">
            <table class="tabela-historico">
                <thead>
                    <tr><th>Referência</th><th>Vencimento</th><th>Pagamento</th><th>Status</th><th>Valor</th></tr>
                </thead>
                <tbody id="corpoTabelaHistorico"></tbody>
            </table>
        </div>
        <div style="text-align: right; margin-top: 20px; font-size: 1.2rem;">
            Total acumulado: <span id="totalHistorico" style="font-weight: bold; color: #0d2bd7;">R$ 0,00</span>
        </div>
    </div>

    <footer class="footer-brand" style="color: #666;">
        ROGÉRIO ESTUMANO | <b>DATA SCIENCE & TECH</b>
    </footer>

    <script>
        let bancoDeDados = { faturasAbertas: [], historicoPagamentos: [] };
        let empresaSelecionada = 'todas';

        async function carregarDados() {
            try {
                const resposta = await fetch('dados.json');
                bancoDeDados = await resposta.json();
                aplicarFiltros();
            } catch (erro) {
                console.error(erro);
                document.getElementById("resumo").innerHTML = "Erro ao carregar dados. Verifique o arquivo dados.json.";
            }
        }

        function selecionarEmpresa(nome) {
            empresaSelecionada = nome;
            aplicarFiltros();
        }

        function aplicarFiltros() {
            const ano = document.getElementById("filtroAno").value;
            let abertas = bancoDeDados.faturasAbertas;
            if (empresaSelecionada !== 'todas') abertas = abertas.filter(f => f.empresa === empresaSelecionada);
            renderizarFaturas(abertas);

            let historico = bancoDeDados.historicoPagamentos;
            if (empresaSelecionada !== 'todas') historico = historico.filter(h => h.empresa === empresaSelecionada);
            if (ano !== 'todos') historico = historico.filter(h => h.dataPagamento.split('/')[2] === ano);
            renderizarHistorico(historico);
        }

        function renderizarFaturas(lista) {
            const container = document.getElementById("cards");
            container.innerHTML = lista.length ? "" : "<p style='color:#333'>Nenhuma fatura em aberto.</p>";
            const total = lista.reduce((s, f) => s + f.valor, 0);
            document.getElementById("resumo").innerHTML = `Você possui <b>${lista.length} faturas</b>, totalizando <b>${total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</b>`;
            
            lista.forEach(f => {
                container.innerHTML += `
                <div class="card-fatura">
                    <div class="card-fatura-header">${f.mes}</div>
                    <div class="card-fatura-body">
                        <div class="card-fatura-valor">${f.valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</div>
                        <div class="card-fatura-info">Vencimento: ${f.vencimento}</div>
                        <div class="pix-box">
                            <button class="btn-pagar" onclick="copiar('${f.codigoPix}')">PIX</button>
                            <button class="btn-pagar" style="background:#fff; color:#0d2bd7; border:1px solid #0d2bd7" onclick="copiar('${f.codigoBoleto}')">BOLETO</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function renderizarHistorico(lista) {
            const area = document.getElementById("areaHistorico");
            const corpo = document.getElementById("corpoTabelaHistorico");
            corpo.innerHTML = "";
            if (empresaSelecionada === 'todas' && lista.length === 0) { area.style.display = "none"; return; }
            area.style.display = "block";

            let total = 0;
            lista.forEach(h => {
                total += h.valor;
                corpo.innerHTML += `
                <tr>
                    <td><strong>${h.mes}</strong></td>
                    <td>${h.vencimento}</td>
                    <td>${h.dataPagamento}</td>
                    <td><span class="status-pago">Pago</span></td>
                    <td>${h.valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</td>
                </tr>`;
            });
            document.getElementById("totalHistorico").innerText = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        }

        function copiar(c) { navigator.clipboard.writeText(c); alert("Código copiado!"); }
        carregarDados();
    </script>
</body>
</html>
